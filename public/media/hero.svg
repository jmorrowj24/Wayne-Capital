<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#1c130a"/>
      <stop offset="42%" stop-color="#5c3f1f"/>
      <stop offset="72%" stop-color="#a9793a"/>
      <stop offset="100%" stop-color="#caa15f"/>
    </linearGradient>
    <radialGradient id="sun" cx="68%" cy="40%" r="42%">
      <stop offset="0%"  stop-color="#f3cf86"/>
      <stop offset="45%" stop-color="#d9a85d" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#d9a85d" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0a06"/>
      <stop offset="100%" stop-color="#070503"/>
    </linearGradient>
    <radialGradient id="vig" cx="50%" cy="48%" r="72%">
      <stop offset="58%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.5"/>
    </radialGradient>
  </defs>

  <!-- Golden-hour sky -->
  <rect width="1600" height="1000" fill="url(#sky)"/>
  <rect width="1600" height="1000" fill="url(#sun)"/>

  <!-- Low skyline silhouette (a quiet Midwest Main Street) -->
  <g fill="#0a0805">
    <rect x="0"    y="690" width="1600" height="310"/>
    <rect x="120"  y="610" width="150"  height="120"/>
    <rect x="300"  y="640" width="110"  height="90"/>
    <rect x="470"  y="585" width="130"  height="145"/>
    <rect x="640"  y="650" width="90"   height="80"/>
    <rect x="900"  y="600" width="120"  height="130"/>
    <rect x="1060" y="640" width="100"  height="90"/>
    <rect x="1210" y="575" width="160"  height="155"/>
    <rect x="1410" y="630" width="120"  height="100"/>
  </g>
  <!-- A couple of warm lit windows -->
  <g fill="#e9b96a" opacity="0.55">
    <rect x="150" y="640" width="10" height="14"/>
    <rect x="180" y="640" width="10" height="14"/>
    <rect x="500" y="615" width="10" height="14"/>
    <rect x="1250" y="610" width="10" height="14"/>
    <rect x="1280" y="610" width="10" height="14"/>
  </g>

  <!-- Foreground settle + vignette -->
  <rect y="940" width="1600" height="60" fill="url(#ground)"/>
  <rect width="1600" height="1000" fill="url(#vig)"/>
</svg>
