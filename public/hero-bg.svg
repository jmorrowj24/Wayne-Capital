<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="base" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0E0E11"/>
      <stop offset="100%" stop-color="#070708"/>
    </linearGradient>
    <radialGradient id="warm" cx="74%" cy="30%" r="62%">
      <stop offset="0%" stop-color="#3c3venezia" stop-opacity="0"/>
      <stop offset="0%" stop-color="#4a3c22"/>
      <stop offset="38%" stop-color="#1a160f"/>
      <stop offset="100%" stop-color="#0B0B0D" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
      <stop offset="55%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.55"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#base)"/>
  <rect width="1600" height="900" fill="url(#warm)" opacity="0.85"/>

  <!-- Faint architectural verticals for a quiet, structural feel -->
  <g stroke="#C9A66B" stroke-opacity="0.05">
    <line x1="980" y1="120" x2="980" y2="780"/>
    <line x1="1120" y1="90"  x2="1120" y2="810"/>
    <line x1="1260" y1="120" x2="1260" y2="780"/>
    <line x1="1400" y1="150" x2="1400" y2="760"/>
  </g>
  <!-- A single warm horizon hairline -->
  <line x1="0" y1="640" x2="1600" y2="640" stroke="#C9A66B" stroke-opacity="0.07"/>

  <rect width="1600" height="900" fill="url(#vignette)"/>
</svg>
